<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOx AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A091A;
            --card: rgba(28, 26, 58, 0.6);
            --primary: #8A2BE2;
            --text: #F0F0F8;
            --text-dim: #A0A0B8;
            --green: #2ecc71;
            --red: #e74c3c;
            --yellow: #f1c40f;
            --border: rgba(138, 43, 226, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overscroll-behavior: none; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s ease-out;
        }
        .card + .card { margin-top: 20px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* Header */
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 1.5em; font-weight: 700; letter-spacing: 1px; }
        .header .meta { font-size: 0.7em; color: var(--text-dim); margin-top: 4px; }
        .header .meta .accent { color: var(--primary); font-weight: 600; }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px; }
        .stat-item { border-radius: 10px; padding: 8px 4px; }
        .stat-item .num { font-size: 1.1em; font-weight: 700; display: block; }
        .stat-item .lbl { font-size: 0.65em; color: var(--text-dim); }
        .stat-green { background: rgba(46,204,113,0.12); }
        .stat-green .num { color: var(--green); }
        .stat-red { background: rgba(231,76,60,0.12); }
        .stat-red .num { color: var(--red); }
        .stat-yellow { background: rgba(241,196,15,0.12); }
        .stat-yellow .num { color: var(--yellow); }

        /* Grid */
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid2 + .grid2 { margin-top: 12px; }
        .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .input-area { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 16px; }

        /* Display box */
        .display-box {
            width: 100%;
            height: 4.5rem;
            font-size: 2.2em;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid rgba(138,43,226,0.1);
        }
        .box-label { font-size: 0.6em; color: var(--text-dim); margin-top: 6px; }

        /* Input */
        .input-box {
            width: 100%;
            height: 4.5rem;
            text-align: center;
            font-size: 2.2em;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            caret-color: var(--primary);
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 0;
            transition: all 0.2s;
        }
        .input-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .input-box::placeholder { color: rgba(160,160,184,0.4); }

        /* Button */
        .btn-glow {
            width: 100%;
            font-size: 1.1em;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 16px 30px;
            background: linear-gradient(45deg, var(--primary), #A020F0);
            box-shadow: 0 0 20px rgba(138,43,226,0.5);
            transition: all 0.3s ease-out;
        }
        .btn-glow:hover:not(:disabled) { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 30px rgba(138,43,226,0.7); }
        .btn-glow:active:not(:disabled) { transform: scale(0.97); }
        .btn-glow:disabled { background: #2a284d; color: #6a6a8a; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Prediction display */
        .next-period { font-size: 0.75em; color: var(--text-dim); font-weight: 500; margin-top: 20px; letter-spacing: 0.5px; }
        .next-period span { color: var(--text); }
        .prediction {
            font-size: 3em;
            font-weight: 700;
            margin: 8px 0 4px;
            transition: color 0.3s;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Outcome buttons */
        .outcome-btns { margin-top: 20px; animation: fadeIn 0.3s ease-out; }
        .outcome-btns button {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.85em;
            padding: 12px 10px;
            border-radius: 12px;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .outcome-btns button:hover { transform: translateY(-2px); }
        .outcome-btns button:active { transform: scale(0.95); }
        .btn-win { background: var(--green); }
        .btn-loss { background: var(--red); }
        .btn-jackpot { background: linear-gradient(45deg, var(--yellow), #e67e22); }

        /* History */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-header h3 { font-size: 0.85em; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .clear-btn { background: none; border: none; color: rgba(231,76,60,0.7); font-size: 0.7em; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 500; }
        .clear-btn:hover { color: var(--red); }
        .history-list { max-height: 210px; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .history-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(138,43,226,0.1);
            font-size: 0.8em;
        }
        .history-entry:last-child { border-bottom: none; }
        .history-entry .info { color: var(--text-dim); font-weight: 500; }
        .history-entry .info strong { color: var(--text); }
        .history-badge {
            font-size: 0.7em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
        }
        .empty-state { text-align: center; color: var(--text-dim); padding: 32px 0; font-size: 0.75em; }
        .hidden { display: none !important; }
        .footer { font-size: 0.55em; color: rgba(160,160,184,0.35); margin-top: 20px; padding-bottom: 16px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>NOx AI</h1>
        <p class="meta"><span class="accent" id="strategyLabel"></span><span id="winRateLabel" style="font-weight:600"></span></p>
    </div>

    <!-- Stats -->
    <div class="card" id="statsCard" style="display:none">
        <div class="stats">
            <div class="stat-item stat-green"><span class="num" id="statWins">0</span><span class="lbl">Wins</span></div>
            <div class="stat-item stat-red"><span class="num" id="statLosses">0</span><span class="lbl">Losses</span></div>
            <div class="stat-item stat-yellow"><span class="num" id="statJackpots">0</span><span class="lbl">Jackpots</span></div>
        </div>
    </div>

    <!-- Prediction Tool -->
    <div class="card">
        <div class="input-area">
            <div class="grid2">
                <div>
                    <div class="display-box" id="box1">?</div>
                    <p class="box-label">Previous Period</p>
                </div>
                <div>
                    <input type="number" id="box2" class="input-box" placeholder="?" oninput="this.value=this.value.slice(0,1)">
                    <p class="box-label">Previous Result</p>
                </div>
            </div>
            <div class="grid2">
                <div>
                    <div class="display-box" id="box3">?</div>
                    <p class="box-label">Previous Period</p>
                </div>
                <div>
                    <input type="number" id="box4" class="input-box" placeholder="?" oninput="this.value=this.value.slice(0,1)">
                    <p class="box-label">Previous Result</p>
                </div>
            </div>
        </div>

        <button id="predictBtn" class="btn-glow" onclick="predict()">PREDICT</button>

        <p class="next-period">Period: <span id="nextPeriod"></span></p>
        <div class="prediction" id="predictionResult">---</div>

        <div id="outcomeArea" class="outcome-btns hidden">
            <div class="grid3">
                <button class="btn-win" onclick="recordOutcome('win')">✓ WIN</button>
                <button class="btn-loss" onclick="recordOutcome('loss')">✗ LOSS</button>
                <button class="btn-jackpot" onclick="recordOutcome('jackpot')">★ JACKPOT</button>
            </div>
        </div>
    </div>

    <!-- History -->
    <div class="card">
        <div class="history-header">
            <h3>History</h3>
            <button class="clear-btn" id="clearBtn" onclick="clearHistory()" style="display:none">Clear All</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-state">No predictions yet</div>
        </div>
    </div>

    <p class="footer"></p>

<script>
const BASE_PERIOD = 20260629100010437n;
const BASE_TIME = new Date('2026-06-29T12:47:00.000+05:30').getTime();
const MAX_HISTORY = 20;

let currentPeriod = 0n, strategy = 'v1', history = [], predPeriod = 0n;

const $ = id => document.getElementById(id);

function vibrate(d=40) { navigator.vibrate?.(d); }

function calcPeriod() {
    const mins = Math.floor((Date.now() - BASE_TIME) / 60000);
    const p = BASE_PERIOD + BigInt(mins);
    if (currentPeriod !== p) {
        currentPeriod = p;
        $('box1').textContent = String(p).slice(-1);
        $('box3').textContent = String(p - 1n).slice(-1);
        $('nextPeriod').textContent = String(p + 1n);
        const isPredicted = sessionStorage.getItem('predicted_period') === String(p + 1n);
        $('predictBtn').disabled = isPredicted;
        $('predictBtn').textContent = isPredicted ? '✓ PREDICTED' : '⚡ PREDICT';
    }
}

function predict() {
    vibrate(70);
    const b1 = parseInt($('box1').textContent);
    const b2 = parseInt($('box2').value);
    const b3 = parseInt($('box3').textContent);
    const b4 = parseInt($('box4').value);

    if ([b1,b2,b3,b4].some(isNaN)) {
        $('predictionResult').textContent = '- - -';
        $('predictionResult').style.color = 'var(--text-dim)';
        return;
    }

    predPeriod = currentPeriod + 1n;
    sessionStorage.setItem('predicted_period', String(predPeriod));

    const reduce = n => { while(n>=10) n = String(n).split('').reduce((s,d) => s+parseInt(d), 0); return n; };
    const v1Digit = reduce(Math.abs(b1-b2) + Math.abs(b3-b4));

    let predTxt = '';
    // OPPOSITE / INVERTED prediction logic
    if (strategy === 'v1') {
        predTxt = (v1Digit >= 5 ? 'SMALL ' : 'BIG ') + v1Digit;
    } else {
        const isV1Big = v1Digit >= 5;
        const v2Num = isV1Big ? (v1Digit%2!==0 ? 8 : 7) : (v1Digit%2!==0 ? 2 : 3);
        predTxt = (isV1Big ? 'BIG ' : 'SMALL ') + v2Num;
    }

    const el = $('predictionResult');
    el.textContent = predTxt;
    el.style.color = predTxt.startsWith('BIG') ? 'var(--green)' : 'var(--red)';

    $('box2').value = '';
    $('box4').value = '';
    $('predictBtn').disabled = true;
    $('predictBtn').textContent = '✓ PREDICTED';
    $('outcomeArea').classList.remove('hidden');
}

function recordOutcome(outcome) {
    vibrate();
    const p = String(predPeriod);
    history.unshift({
        period: p.slice(-4),
        prediction: $('predictionResult').textContent,
        outcome: outcome.toUpperCase()
    });
    if (history.length > MAX_HISTORY) history.pop();
    saveHistory();
    renderHistory();
    updateStats();

    if (outcome === 'loss') {
        strategy = strategy === 'v1' ? 'v2' : 'v1';
        $('strategyLabel').textContent = strategy.toUpperCase();
    }

    $('outcomeArea').classList.add('hidden');
    $('predictionResult').textContent = '---';
    $('predictionResult').style.color = 'var(--text-dim)';
}

function updateStats() {
    const wins = history.filter(h => h.outcome === 'WIN').length;
    const losses = history.filter(h => h.outcome === 'LOSS').length;
    const jackpots = history.filter(h => h.outcome === 'JACKPOT').length;
    const rate = history.length > 0 ? Math.round((wins / history.length) * 100) : 0;

    $('statWins').textContent = wins;
    $('statLosses').textContent = losses;
    $('statJackpots').textContent = jackpots;

    const wr = $('winRateLabel');
    wr.textContent = rate + '%';
    wr.style.color = rate >= 50 ? 'var(--green)' : 'var(--red)';

    $('statsCard').style.display = history.length > 0 ? '' : 'none';
}

function renderHistory() {
    const list = $('historyList');
    $('clearBtn').style.display = history.length > 0 ? '' : 'none';

    if (history.length === 0) {
        list.innerHTML = '<div class="empty-state">No predictions yet</div>';
        return;
    }

    list.innerHTML = history.map(e => {
        const color = e.outcome === 'WIN' ? 'var(--green)' : e.outcome === 'LOSS' ? 'var(--red)' : 'var(--yellow)';
        const bg = e.outcome === 'WIN' ? 'rgba(46,204,113,0.12)' : e.outcome === 'LOSS' ? 'rgba(231,76,60,0.12)' : 'rgba(241,196,15,0.12)';
        return `<div class="history-entry"><span class="info"><strong>${e.period}</strong> · ${e.prediction}</span><span class="history-badge" style="color:${color};background:${bg}">${e.outcome}</span></div>`;
    }).join('');
}

function saveHistory() { localStorage.setItem('predictionHistory_v4', JSON.stringify(history)); }

function clearHistory() {
    vibrate();
    if (confirm('Clear history?')) {
        history = [];
        localStorage.removeItem('predictionHistory_v4');
        renderHistory();
        updateStats();
    }
}

// Init
const saved = localStorage.getItem('predictionHistory_v4');
if (saved) history = JSON.parse(saved);
calcPeriod();
setInterval(calcPeriod, 1000);
renderHistory();
updateStats();
</script>
</body>
</html>
