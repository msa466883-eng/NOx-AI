<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOx AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background-dark: #0A091A; --card-background: rgba(28, 26, 58, 0.6); --primary-accent: #8A2BE2;
            --text-light: #F0F0F8; --text-secondary: #A0A0B8; --text-green: #2ecc71; --text-red: #e74c3c;
            --text-yellow: #f1c40f; --border-color: rgba(138, 43, 226, 0.2);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html, body { overscroll-behavior: none; }
        body {
            font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: flex-start; flex-direction: column;
            background-color: var(--background-dark); margin: 0; color: var(--text-light); min-height: 100vh;
            -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; padding: 20px; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        .container {
            background: var(--card-background); backdrop-filter: blur(12px); border: 1px solid var(--border-color); padding: 25px; border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3); text-align: center; width: 100%; max-width: 400px;
            animation: fadeIn 0.6s ease-out; box-sizing: border-box; margin-bottom: 20px;
        }
        h2 { font-size: 1.5em; font-weight: 700; margin: 0 0 25px 0; color: var(--text-light); letter-spacing: 1px; }
        .input-field {
            width: 100%; text-align: center; caret-color: var(--primary-accent);
            background-color: var(--background-dark); border: 2px solid var(--border-color); color: var(--text-light);
            padding: 12px; border-radius: 12px; font-size: 1em; margin-bottom: 15px; transition: all 0.2s; box-sizing: border-box;
        }
        .input-field:focus { outline: none; border-color: var(--primary-accent); box-shadow: 0 0 15px var(--primary-accent); }
        .btn-glow {
            width: 100%; font-size: 1.2em; font-weight: 700; color: white; border: none; border-radius: 12px; cursor: pointer;
            margin-top: 10px; text-transform: uppercase; letter-spacing: 1.5px; padding: 16px 30px;
            background: linear-gradient(45deg, var(--primary-accent), #A020F0);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); transition: all 0.3s ease-out;
        }
        .btn-glow:hover:not(:disabled) { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 30px rgba(138, 43, 226, 0.7); }
        .btn-glow:disabled { background: #2a284d; color: #6a6a8a; cursor: not-allowed; box-shadow: none; transform: none; }
        #upcomingPeriodDisplay { font-size: 1.1em; color: var(--text-secondary); margin-top: 25px; margin-bottom: 5px; font-weight: 600; letter-spacing: 1px; }
        #predictionResultBox { font-size: 3.5em; font-weight: 700; color: var(--text-green); min-height: 60px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .win-loss-buttons { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .win-loss-buttons button { font-weight: 600; padding: 12px 10px; border-radius: 10px; color: white; border: none; cursor: pointer; transition: transform 0.2s; }
        .win-loss-buttons button:hover { transform: translateY(-2px); }
        .win { background-color: var(--text-green); }
        .loss { background-color: var(--text-red); }
        .jackpot { background: linear-gradient(45deg, #f1c40f, #e67e22); }
        .history-list { max-height: 200px; overflow-y: auto; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: var(--primary-accent); border-radius: 10px; }
        .history-entry { background: transparent; padding: 12px 5px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .history-entry:last-child { border-bottom: none; }
        .history-outcome { text-shadow: 0 0 5px; font-size: 0.9em; padding: 4px 10px; border-radius: 8px; color: white; }
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: 1fr 1fr; }
        .gap-4 { gap: 16px; }
        .mt-4 { margin-top: 16px; }
        .mt-1 { margin-top: 4px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-6 { margin-bottom: 24px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .text-center { text-align: center; }
        .font-bold { font-weight: 700; }
        .text-xs { font-size: 0.75em; }
        .text-sm { font-size: 0.875em; }
        .text-lg { font-size: 1.125em; }
        .text-xl { font-size: 1.25em; }
        .text-5xl { font-size: 3em; }
        .text-6xl { font-size: 3.75em; }
        .w-full { width: 100%; }
        .h-20 { height: 5rem; }
        .p-0 { padding: 0; }
        .p-4 { padding: 16px; }
        .m-0 { margin: 0; }
        .my-2 { margin-top: 8px; margin-bottom: 8px; }
        .rounded-lg { border-radius: 8px; }
        .rounded-xl { border-radius: 12px; }
        .space-y-2 > * + * { margin-top: 8px; }
        .bg-dark { background-color: var(--background-dark); }
        .bg-black-20 { background-color: rgba(0,0,0,0.2); }
        .text-accent { color: var(--primary-accent); }
        .text-secondary { color: var(--text-secondary); }
        .text-red { color: #f87171; }
        .text-green { color: var(--text-green); }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="container tool-container">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl m-0">NOx AI<span id="strategy-version" class="text-xs text-accent">(V1)</span></h2>
            </div>
            <div class="bg-black-20 p-4 rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <div id="box1" class="w-full h-20 text-5xl flex items-center justify-center font-bold bg-dark rounded-lg">?</div>
                        <p class="text-xs mt-1 text-secondary">Last Period</p>
                    </div>
                    <input type="number" id="box2" class="w-full h-20 text-5xl text-center font-bold bg-dark rounded-lg input-field p-0" oninput="this.value=this.value.slice(0,1)" placeholder="?">
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div class="text-center">
                        <div id="box3" class="w-full h-20 text-5xl flex items-center justify-center font-bold bg-dark rounded-lg">?</div>
                        <p class="text-xs mt-1 text-secondary">Previous Period</p>
                    </div>
                    <input type="number" id="box4" class="w-full h-20 text-5xl text-center font-bold bg-dark rounded-lg input-field p-0" oninput="this.value=this.value.slice(0,1)" placeholder="?">
                </div>
            </div>
            <button id="predictButton" class="btn-glow" onclick="predictResult()">PREDICT</button>
            <div id="upcomingPeriodDisplay" class="text-lg text-secondary" style="margin-top:20px;font-weight:600"></div>
            <div id="predictionResultBox" class="text-6xl font-bold text-green my-2" style="min-height:60px;display:flex;align-items:center;justify-content:center">---</div>
            <div id="winLossButtons" class="win-loss-buttons hidden">
                <button class="win" onclick="handleOutcome('win')">WIN</button>
                <button class="loss" onclick="handleOutcome('loss')">LOSS</button>
                <button class="jackpot" onclick="handleOutcome('jackpot')">JACKPOT</button>
            </div>
        </div>

        <div class="container">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold" style="margin:0">History</h3>
                <button id="clearHistoryBtn" class="text-xs text-red" style="background:none;border:none;cursor:pointer;color:#f87171" onclick="clearHist()">Clear</button>
            </div>
            <div id="history-list" class="text-sm space-y-2 history-list"></div>
        </div>
    </div>

    <script>
        const BASE_PERIOD = 20260629100010437n;
        const BASE_TIME_STRING = '2026-06-29T12:47:00.000+05:30';
        const MAX_HISTORY_LENGTH = 20;

        const box1Display = document.getElementById('box1');
        const box3Display = document.getElementById('box3');
        const box2Input = document.getElementById('box2');
        const box4Input = document.getElementById('box4');
        const predictButton = document.getElementById('predictButton');
        const upcomingPeriodDisplay = document.getElementById('upcomingPeriodDisplay');
        const predictionResultBox = document.getElementById('predictionResultBox');
        const winLossButtons = document.getElementById('winLossButtons');
        const strategyVersionDisplay = document.getElementById('strategy-version');
        const historyListDiv = document.getElementById('history-list');

        let currentStrategy = 'v1', currentPeriod = 0n, history = [], periodWhenPredictionWasMade = 0n;

        function vibrate(d = 40) { navigator.vibrate?.(d); }

        function updateUiWithPeriod(p) {
            currentPeriod = p;
            const pStr = String(p), prevPStr = String(p - 1n);
            box1Display.textContent = pStr.slice(-1);
            box3Display.textContent = prevPStr.slice(-1);
            const newUpPeriod = String(p + 1n);
            upcomingPeriodDisplay.textContent = "Next Period: " + newUpPeriod;
            if (sessionStorage.getItem('predicted_period') !== newUpPeriod) {
                predictButton.disabled = false; predictButton.textContent = "PREDICT";
            } else {
                predictButton.disabled = true; predictButton.textContent = "PREDICTED";
            }
        }

        function calculateCurrentPeriod() {
            const baseTime = new Date(BASE_TIME_STRING);
            const currentTime = new Date();
            const minutesPassed = Math.floor((currentTime.getTime() - baseTime.getTime()) / 60000);
            const calculatedPeriod = BASE_PERIOD + BigInt(minutesPassed);
            if (currentPeriod !== calculatedPeriod) updateUiWithPeriod(calculatedPeriod);
        }

        function predictResult() {
            vibrate(70);
            const b1 = parseInt(box1Display.textContent), b2 = parseInt(box2Input.value),
                  b3 = parseInt(box3Display.textContent), b4 = parseInt(box4Input.value);
            if ([b1, b2, b3, b4].some(isNaN)) { predictionResultBox.textContent = "- - -"; return; }
            periodWhenPredictionWasMade = currentPeriod + 1n;
            sessionStorage.setItem('predicted_period', String(periodWhenPredictionWasMade));
            const reduce = n => { while (n >= 10) n = String(n).split('').reduce((s, d) => s + parseInt(d), 0); return n; };
            const v1Digit = reduce(Math.abs(b1 - b2) + Math.abs(b3 - b4));
            let predTxt = "";
            if (currentStrategy === 'v1') {
                predTxt = (v1Digit >= 5 ? "BIG " : "SMALL ") + v1Digit;
            } else {
                const isV1Big = v1Digit >= 5;
                let v2Num = isV1Big ? (v1Digit % 2 !== 0 ? 2 : 3) : (v1Digit % 2 !== 0 ? 8 : 7);
                predTxt = (isV1Big ? "SMALL " : "BIG ") + v2Num;
            }
            predictionResultBox.textContent = predTxt;
            box2Input.value = ''; box4Input.value = '';
            predictButton.disabled = true; predictButton.textContent = "PREDICTED";
            winLossButtons.classList.remove('hidden');
        }

        function handleOutcome(o) {
            vibrate();
            const p = String(periodWhenPredictionWasMade);
            history.unshift({ period: p.slice(-4), prediction: predictionResultBox.textContent, outcome: o.toUpperCase() });
            if (history.length > MAX_HISTORY_LENGTH) history.pop();
            saveHistory(); renderHistory();
            if (o === 'loss') {
                currentStrategy = currentStrategy === 'v1' ? 'v2' : 'v1';
                strategyVersionDisplay.textContent = '(' + currentStrategy.toUpperCase() + ')';
            }
            winLossButtons.classList.add('hidden');
            predictButton.textContent = "PREDICTED";
            predictionResultBox.textContent = "---";
        }

        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (history.length === 0) {
                historyListDiv.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:16px 0">No result found</div>';
                return;
            }
            history.forEach(e => {
                const d = document.createElement('div'); d.className = 'history-entry';
                const color = e.outcome === 'WIN' ? 'var(--text-green)' : e.outcome === 'LOSS' ? 'var(--text-red)' : 'var(--text-yellow)';
                d.innerHTML = '<span>' + e.period + ' - ' + e.prediction + '</span><span class="history-outcome" style="color:' + color + '">' + e.outcome + '</span>';
                historyListDiv.appendChild(d);
            });
        }

        function saveHistory() { localStorage.setItem('predictionHistory_v4', JSON.stringify(history)); }
        function loadHistory() { const h = localStorage.getItem('predictionHistory_v4'); if (h) history = JSON.parse(h); renderHistory(); }
        function clearHist() { vibrate(); if (confirm("Clear history?")) { history = []; localStorage.removeItem('predictionHistory_v4'); renderHistory(); } }

        calculateCurrentPeriod();
        setInterval(calculateCurrentPeriod, 1000);
        loadHistory();
    </script>
</body>
</html>
